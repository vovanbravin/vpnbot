version: "3"

services:

  mongo:
    image: mongo:latest
    restart: always
    container_name: vpn-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - vpn-network

  mongo-express:
    image: mongo-express:latest
    restart: always
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongo:27017/
      ME_CONFIG_BASICAUTH_ENABLED: true
      ME_CONFIG_BASICAUTH_USERNAME: ${ME_USERNAME}
      ME_CONFIG_BASICAUTH_PASSWORD: ${ME_PASSWORD}
    depends_on:
      - mongo
    networks:
      - vpn-network

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vpn-bot
    restart: always
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      MONGO_URL: mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongo:27017/${MONGO_DATABASE}?authSource=admin
      MONGO_DB: ${MONGO_DATABASE}
    depends_on:
      - mongo
    networks:
      - vpn-network
    volumes:
      - ./logs:/app/logs

networks:
  vpn-network:
    driver: bridge

volumes:
  mongo-data: